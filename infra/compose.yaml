services:
  postgres:
    image: postgres:17.5-bookworm
    environment:
      POSTGRES_DB: compintel
      POSTGRES_USER: compintel
      POSTGRES_PASSWORD: compintel
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compintel"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8.0.2-bookworm
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  go-judge:
    image: compintel/go-judge:2160a4767fe77010a036497e4246dcd41446b70f
    build:
      context: ..
      dockerfile: infra/go-judge.Dockerfile
    privileged: true
    shm_size: 256m
    command: ["-http-addr", "0.0.0.0:5050"]
    ports:
      - "5050:5050"

volumes:
  postgres-data:
  redis-data:
